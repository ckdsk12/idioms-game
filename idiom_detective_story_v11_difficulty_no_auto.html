<style>

ign-items:flex-start;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.035);border-radius:16px;padding:12px}.file-ico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:rgba(245,181,50,.12);border:1px solid rgba(245,181,50,.3)}.file-item b{display:block}.file-item span{color:var(--muted);font-size:13px}.profile input{width:100%;border:1px solid var(--line);background:#0a1b2d;color:var(--text);border-radius:15px;padding:14px 15px;font-size:16px;outline:none}.badges{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}.badge-card{border:1px solid var(--line);border-radius:18px;padding:14px;text-align:center;background:#0c2035;transition:.15s}.badge-card.selected{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,181,50,.15);background:#182d3c}.badge-card .emoji{font-size:28px}.badge-card b{display:block;margin-top:5px}.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.mode-card{border:1px solid var(--line);border-radius:18px;padding:14px;text-align:left;background:#0c2035;transition:.15s;color:var(--text)}.mode-card.selected{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,181,50,.15);background:#182d3c}.mode-card b{display:block}.mode-card span{display:block;color:var(--muted);font-size:12px;margin-top:4px;line-height:1.45}.notice{border-left:4px solid var(--gold);background:rgba(245,181,50,.08);border-radius:16px;padding:15px 16px;color:#d9e5f3;line-height:1.65}.screen{animation:fade .25s ease}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.headerline{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin:14px 0 18px}.eyebrow{color:var(--muted);font-size:13px;letter-spacing:.06em}.title{font-size:26px;font-weight:950;margin:3px 0 0;letter-spacing:-.04em}.progress{display:flex;gap:8px;align-items:center;justify-content:center;margin:14px 0 26px}.dot{width:9px;height:9px;border-radius:99px;background:#607086}.dot.on{background:var(--green)}.dot.now{background:var(--gold)}

der-left:3px solid var(--gold);border-radius:14px;padding:16px 17px;margin:14px 0;line-height:1.85;white-space:pre-line}.question{font-size:18px;font-weight:900;margin:16px 0 10px}.options{display:grid;gap:10px}.option{border:1px solid var(--line);border-radius:15px;background:#132840;color:var(--text);padding:14px;text-align:left;display:flex;gap:10px;align-items:flex-start}.option:hover{border-color:var(--gold)}.num{display:inline-grid;place-items:center;width:25px;height:25px;border-radius:99px;background:#274563;color:#d8eaff;font-size:13px;flex:0 0 auto}.feedback{margin-top:14px;border-radius:16px;padding:14px 15px;line-height:1.65}.feedback.good{border:1px solid rgba(49,209,124,.45);background:rgba(49,209,124,.12)}.feedback.bad{border:1px solid rgba(255,95,101,.45);background:rgba(255,95,101,.11)} .match-wrap{display:grid;gap:16px}.chips{display:flex;gap:10px;flex-wrap:wrap;min-height:50px}.chip{border:1px solid rgba(245,181,50,.5);background:rgba(245,181,50,.12);color:var(--gold2);border-radius:999px;padding:10px 13px;font-weight:900;user-select:none}.chip[draggable="true"]{cursor:grab}.chip.dragging{opacity:.55;transform:scale(.98)}.chip.used{opacity:.46;border-style:dashed}.chip.selected{background:var(--gold);color:#102033}.targets{display:grid;gap:10px}.target{border:1px dashed var(--line2);border-radius:17px;padding:13px;min-height:76px;background:rgba(8,23,38,.55);display:grid;grid-template-columns:1fr minmax(150px,auto);gap:10px;align-items:center;text-align:left;color:var(--text);transition:.15s}.target:hover{border-color:rgba(245,181,50,.55);background:rgba(16,38,61,.75)}.target.drag-over{border-style:solid;border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,181,50,.12)}.target b{display:block}.target span{color:var(--muted);font-size:13px}.dropval{color:var(--muted);font-style:italic;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);border-radius:999px;padding:8px 11px;text-align:center}.target.filled{border-style:solid;border-color:rgba(245,181,50,.55)}.target.filled .dropval{color:#102033;background:var(--gold);font-weight:900;font-style:normal}.answer-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:16px}.select-card{border:1px solid var(--line);background:#11263d;border-radius:18px;padding:14px}.select-card h4{margin:0 0 10px;color:var(--gold2)}.select-card label{display:block;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);border-radius:13px;padding:10px;margin-top:8px;cursor:pointer}.select-card input{margin-right:8px}.ending{border:1px solid rgba(245,181,50,.45);background:linear-gradient(145deg,#132740,#071522);border-radius:28px;padding:30px;box-shadow:var(--shadow)}.ending h2{font-size:34px;margin:0 0 10px}.ending .grade{display:inline-block;border-radius:999px;padding:7px 12px;background:rgba(245,181,50,.14);border:1px solid rgba(245,181,50,.4);color:var(--gold2);font-weight:900;margin-bottom:14px}.book{margin-top:20px}.idiom-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;max-height:430px;overflow:auto;padding-right:5px}.idiom{border:1px solid rgba(255,255,255,.08);background:#0d2034;border-radius:15px;padding:12px}.idiom b{color:var(--gold2)}.idiom span{color:#b7c6d7;display:block;margin-top:4px;font-size:13px;line-height:1.55}.modal{position:fixed;inset:0;background:rgba(0,0,0,.58);display:grid;place-items:center;z-index:50;padding:20px}.modal-card{width:min(680px,100%);background:#0f2238;border:1px solid rgba(245,181,50,.42);border-radius:24px;box-shadow:var(--shadow);padding:22px}.modal-card h3{margin:0 0 12px}.modal-card dl{display:grid;gap:12px}.modal-card dt{color:var(--gold2);font-weight:900}.modal-card dd{margin:3px 0 0;color:#dce9f8;line-height:1.65}.modal-actions{display:flex;justify-content:flex-end;margin-top:18px}.float-note{position:fixed;right:18px;bottom:18px;background:#102740;border:1px solid var(--line);box-shadow:var(--shadow);border-radius:18px;padding:14px 15px;max-width:330px;color:#d8e9fa;z-index:40;line-height:1.55}.toast{animation:pop .25s ease}@keyframes pop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
@media(max-width:760px){.hero-grid,.answer-grid,.clue-grid,.statbar{grid-template-columns:1fr}.badges{grid-template-columns:1fr}.bubble{max-width:100%}.wrap{width:min(100% - 24px,940px)}.hero-card{padding:24px}.idiom-grid{grid-template-columns:1fr}.topinner{gap:10px}.pill{font-size:12px;padding:6px 9px}}

<body>
<div class="topbar hide" id="topbar">
  <div class="topinner">
    <div class="brand">🕵️ 관용표현 추리 사건</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end">
      <span class="pill">탐정 <strong id="navName">-</strong></span>
      <span class="pill timer" id="timer">⏱ 18:00</span>
      <button class="btn ghost small" onclick="openNotebook()">수첩</button>
    </div>
  </div>
</div>

<main id="app"></main>

</div>

function selectBadge(btn,badge){document.querySelectorAll('.badge-card').forEach(x=>x.classList.remove('selected'));btn.classList.add('selected');state.badge=badge}
function selectMode(btn,mode){document.querySelectorAll('.mode-card').forEach(x=>x.classList.remove('selected'));btn.classList.add('selected');state.difficulty=mode}
function startGame(){
  state.name = (el('nick')?.value||'익명 탐정').trim()||'익명 탐정';
  state.time = state.difficulty==='easy' ? 20*60 : 16*60;
  el('navName').textContent = `${state.badge} ${state.name}`; el('topbar').classList.remove('hide');
  updateTimer();
  if(!state.timer){state.timer=setInterval(tick,1000)}
  goScene(1);
}
function tick(){
  if(state.screen==='home'||state.screen==='end') return;
  state.time--; updateTimer(); if(state.time<=0){state.time=0; renderEnding('time')}
}
function updateTimer(){
  const m=Math.floor(state.time/60), s=String(state.time%60).padStart(2,'0'); const t=el('timer'); if(t){t.textContent=`⏱ ${m}:${s}`; t.classList.toggle('danger',state.time<240)}
}
function addNote(title,text){state.notes.push({title,text}); toast(`수첩에 기록됨: ${title}`)}
function toast(msg){const f=el('float');f.innerHTML=msg;f.classList.remove('hide');f.classList.add('toast');setTimeout(()=>{f.classList.add('hide');f.classList.remove('toast')},2400)}
function openNotebook(){
  const clues = Object.keys(state.found).length ? Object.values(state.found).map(c=>`<div class="idiom"><b>${c.title}</b><span>${c.short}</span></div>`).join('') : '<p style="color:var(--muted)">아직 기록된 단서가 없습니다.</p>';
  const notes = state.notes.length ? state.notes.slice(-8).map(n=>`<div class="idiom"><b>${n.title}</b><span>${n.text}</span></div>`).join('') : '<p style="color:var(--muted)">아직 분석 기록이 없습니다.</p>';
  showModal('탐정 수첩', `<div class="statbar"><div class="stat"><small>추리력</small><b>${state.deduction}</b></div><div class="stat"><small>공감도</small><b>${state.empathy}</b></div><div class="stat"><small>소문 위험</small><b>${state.rumor}</b></div><div class="stat"><small>확보 단서</small><b>${Object.keys(state.found).length}</b></div></div><h4>확보한 단서</h4><div class="idiom-grid">${clues}</div><h4 style="margin-top:18px">분석 기록</h4><div class="idiom-grid">${notes}</div>`)
}
function showModal(title,body){el('modalTitle').innerHTML=title;el('modalBody').innerHTML=body;el('modal').classList.remove('hide')}
function closeModal(){el('modal').classList.add('hide')}
function clueCard(c){
  const seen=state.found[c.id];
  return `<button class="clue-card" onclick='openClue(${JSON.stringify(c).replaceAll("'","&#39;")})'><div class="ico">${c.ico||'🔍'}</div><div><b>${c.title}</b><span>${c.short}</span></div><span class="tag ${seen?'old':''}">${seen?'확인':'NEW'}</span></button>`
}
function openClue(c){
  if(!state.found[c.id]){state.clues++; state.found[c.id]=c;}
  showModal(c.title, `<dl><div><dt>원래 알고 있던 것</dt><dd>${c.before}</dd></div><div><dt>조사 후 새롭게 보인 점</dt><dd>${c.after}</dd></div><div><dt>수첩 메모</dt><dd>${c.memo}</dd></div></dl>`)
}
function next(btn){state.step++; render(btn)}
function goScene(n){state.screen='scene'+n; state.step=n-1; render()}
function render(){
  document.body.scrollTop=document.documentElement.scrollTop=0; updateTimer();
  const key=state.screen;
  if(key==='scene1') return scene1(); if(key==='q1') return q1(); if(key==='scene2') return scene2(); if(key==='match1') return match1();

function qTemplate(q){
  state.questionExplain[q.id]=q.explain;
  if(!state.questionDecks[q.id]){
    const original=q.options.map((text,i)=>({text, correct:i===q.answer}));
    let deck=shuffled(original);
    // 우연히 원래 순서 그대로 나오면 한 칸 돌려서 '정답 1번 고정'처럼 보이지 않게 한다.
    if(deck.length>1 && deck.every((item,i)=>item.text===original[i].text)) deck.push(deck.shift());
    state.questionDecks[q.id]=deck;
  }
  const opts=state.questionDecks[q.id].map((o,i)=>`<button class="option" onclick="answerQ('${q.id}',${o.correct?'true':'false'},'${q.next}')"><span class="num">${i+1}</span><span>${o.text}</span></button>`).join('')
  screenShell(q.eyebrow,q.title,`<div class="qcard"><div class="qnum">관용표현 추리</div><div class="quote">${q.quote}</div><div class="question">${q.question}</div><div class="options">${opts}</div><div id="fb"></div></div>`)

function answerQ(id,isCorrect,nextScreen){
  if(state.answeredIds[id]) return; state.answeredIds[id]=true; state.answered++;

  const good=!!isCorrect; if(good){state.deduction+=2; state.empathy+= id==='q1'?1:0; addNote('정답 분석',explain)} else {state.wrong++; state.time-=45; state.rumor+=1; addNote('오답 기록',`다시 생각할 부분: ${explain}`)}

}

function shuffled(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function chipButton(x){return `<button class="chip" draggable="true" ondragstart="dragChip(event,'${x}')" ondragend="dragEnd(event)" onclick="selectChip('${x}')">${x}</button>`}
function target(id,text,hint){
  const hintHtml = state.difficulty==='easy' ? `<span>${hint}</span>` : '';
  return `<button class="target" onclick="placeChip('${id}')" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)" ondrop="dropChip(event,'${id}')"><div><b>${text}</b>${hintHtml}</div><div class="dropval" id="drop-${id}">여기에 놓기</div></button>`
}
function dragChip(ev,x){state.draggingChip=x; state.selectedChip=x; ev.dataTransfer.setData('text/plain',x); ev.currentTarget.classList.add('dragging')}
function dragEnd(ev){ev.currentTarget.classList.remove('dragging'); document.querySelectorAll('.target').forEach(t=>t.classList.remove('drag-over'))}
function allowDrop(ev){ev.preventDefault()}
function dragEnter(ev){ev.preventDefault(); ev.currentTarget.classList.add('drag-over')}
function dragLeave(ev){ev.currentTarget.classList.remove('drag-over')}
function dropChip(ev,id){ev.preventDefault(); ev.currentTarget.classList.remove('drag-over'); const x=ev.dataTransfer.getData('text/plain') || state.draggingChip; assignChip(id,x)}
function selectChip(x){state.selectedChip=x; document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('selected',c.textContent===x))}
function placeChip(id){if(!state.selectedChip){toast('먼저 관용표현 카드를 선택하거나 끌어오세요.');return} assignChip(id,state.selectedChip)}
function assignChip(id,x){
  if(!x) return;
  Object.keys(state.matches).forEach(k=>{ if(state.matches[k]===x){ state.matches[k]=null; const old=el('drop-'+k); if(old){old.textContent='여기에 놓기'; old.closest('.target').classList.remove('filled')} } });
  state.matches[id]=x;
  const drop=el('drop-'+id);
  if(drop){drop.textContent=x; drop.closest('.target').classList.add('filled')}
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('used', Object.values(state.matches).includes(c.textContent)));
}

  }
  el('matchfb').innerHTML=`<div class="feedback ${ok?'good':'bad'}"><b>${ok?'✔ 연결 성공':'✖ 일부 연결이 어긋났습니다'}</b><br>${ok?'상황을 보고 표현을 자연스럽게 연결했습니다.':'정답을 바로 공개하지 않습니다. 수첩의 단톡방 단서를 다시 떠올리며 다음 장에서 확인하세요.'}</div><button class="btn" style="width:100%;margin-top:12px" onclick="state.screen='scene3';render()">CCTV 확인 →</button>`
}

  ${clueCard({id:'team',ico:'🤝',title:'다시 맞춘 손발',short:'수정·확인·방송 역할을 나눌 수 있음',before:'세 학생은 서로를 의심하며 움직였다.',after:'동민은 편집 수정, 소연은 소문 차단, 준호는 장비 운반을 맡으면 발표를 살릴 수 있다.',memo:'사건의 마무리는 벌주기가 아니라 회복이 될 수도 있다.'})}
 </div></div>
 <div class="panel"><h3 class="section-title">📣 마지막 공개 방식</h3><div class="choicebox">
  <button class="choice" onclick="chooseReveal('accuse')"><b>모두 앞에서 동민이 숨겼다고 말한다</b></button>
  <button class="choice" onclick="chooseReveal('teacher')"><b>선생님께 먼저 설명하고, 필요한 말만 반에 알린다</b></button>
  <button class="choice" onclick="chooseReveal('team')"><b>세 학생과 먼저 머리를 맞대고 해결 순서를 정한다</b></button>
 </div><div id="revealResult"></div></div>
 <div class="btn-row"><button class="btn" onclick="proceedAfterReveal()">마지막 표현 정리 →</button></div>`)}
function proceedAfterReveal(){if(!state.choices.reveal){toast('공개 방식을 먼저 정하세요.');return} state.screen='q5'; render()}
function chooseReveal(type){
  if(state.choices.revealLocked){toast('이미 공개 방식을 정했습니다. 다음 장으로 넘어가세요.');return}
  state.choices.reveal=type; state.choices.revealLocked=true; const r=el('revealResult');
  if(type==='accuse'){
    state.rumor+=3;state.deduction+=1;addNote('공개 방식','복도에서 바로 말하자 주변 학생들이 수아 이름을 추측하기 시작했다.');
    r.innerHTML='<div class="mini-result">복도 쪽에서 웅성거림이 번졌다. 몇몇 학생이 수아의 이름을 조심스럽게 입에 올리기 시작했다.</div>'
  }
  if(type==='teacher'){
    state.empathy+=2;state.deduction+=2;state.time-=35;addNote('공개 방식','선생님께 먼저 설명했다. 사실 확인과 친구 보호를 함께 준비했다.');
    r.innerHTML='<div class="mini-result">선생님은 낮은 목소리로 “필요한 사실만 말하자”고 했다.</div>'
  }
  if(type==='team'){
    state.empathy+=3;state.deduction+=2;state.time-=50;addNote('공개 방식','세 학생과 머리를 맞댔다. 동민은 직접 사과하고, 소연은 소문을 막고, 준호는 장비를 챙기기로 했다.');
    r.innerHTML='<div class="mini-result">세 사람은 잠깐 말없이 서 있다가, 각자 해야 할 일을 하나씩 맡았다.</div>'
  }
  updateTimer();
}
function q5(){state.step=12; qTemplate({id:'q5',eyebrow:'단서 분석 #5',title:'사건을 마무리하는 말',quote:'USB는 국어사전 뒤에서 발견됐다. 동민은 영상을 고치고, 소연은 더 이상 소문이 퍼지지 않게 친구들에게 조용히 설명하기로 했다. 준호는 방송 장비를 챙기며 “이번엔 서로 역할을 맞춰 보자”고 했다.',question:'세 사람이 각자 맡은 일을 맞춰 가며 협조하는 모습에 가장 알맞은 관용표현은?',options:['손발을 맞추다','물을 끼얹은 듯','국물도 없다','얼굴에 먹칠을 하다'],answer:0,explain:'“손발을 맞추다”는 어떤 일을 할 때 서로 잘 협조한다는 뜻입니다. 여기서는 편집, 소문 차단, 장비 준비를 나누어 해결하는 모습과 연결됩니다.',next:'final'})}

function finalDeduction(){state.step=13; screenShell('최종 추리','진실을 정리하세요', `
 <div class="panel gold"><h3 class="section-title">⚖️ 탐정의 마지막 선택</h3><div class="story">수첩에는 충분한 단서가 모였다. 이제 사건의 핵심을 세 가지로 정리해야 한다.

누가 USB를 숨겼는가? 왜 숨겼는가? 어디에 숨겼는가?</div>
 <div class="statbar"><div class="stat"><small>추리력</small><b>${state.deduction}</b></div><div class="stat"><small>공감도</small><b>${state.empathy}</b></div><div class="stat"><small>소문 위험</small><b>${state.rumor}</b></div><div class="stat"><small>남은 시간</small><b>${Math.floor(state.time/60)}:${String(state.time%60).padStart(2,'0')}</b></div></div></div>
 <div class="answer-grid">
  <div class="select-card"><h4>1. 숨긴 사람</h4>${radio('suspect','준호','준호')}${radio('suspect','소연','소연')}${radio('suspect','동민','동민')}</div>
  <div class="select-card"><h4>2. 이유</h4>${radio('motive','장난으로 친구들을 놀리려고','장난')}${radio('motive','창피한 장면을 고치고 방송하려고','보호')}${radio('motive','발표를 망치고 싶어서','방해')}</div>
  <div class="select-card"><h4>3. 숨긴 장소</h4>${radio('place','방송실 쓰레기통 안','쓰레기통')}${radio('place','국어자료실 낡은 사전 뒤','사전')}${radio('place','준호의 가방 안','가방')}</div>
 </div>
 <div class="btn-row"><button class="btn" onclick="judgeEnding()">엔딩 확인 ▶</button><button class="btn secondary" onclick="state.screen='book';render()">관용표현 도감 보기</button></div>`)}
function radio(group,label,val){return `<label><input type="radio" name="${group}" value="${val}" onchange="state.final['${group}']='${val}'">${label}</label>`}
function judgeEnding(){if(!state.final.suspect||!state.final.motive||!state.final.place){toast('세 가지를 모두 선택해야 합니다.');return} const correct=state.final.suspect==='동민'&&state.final.motive==='보호'&&state.final.place==='사전'; if(!correct){renderEnding('bad');return} if(state.time<=0){renderEnding('time');return} if(state.choices.reveal==='team'&&state.empathy>=7&&state.deduction>=13&&state.rumor<=3){renderEnding('secret');return} if(state.choices.reveal!=='accuse'&&state.empathy>=5&&state.deduction>=11&&state.rumor<=5){renderEnding('true');return} if(state.rumor>=7||state.choices.reveal==='accuse'){renderEnding('rumor');return} renderEnding('good')}
function renderEnding(type){state.screen='end'; if(state.timer){clearInterval(state.timer);state.timer=null} const data={
 time:['TIME OVER','방송이 시작되기 전까지 USB를 찾지 못했다. 사건은 선생님에게 넘어갔고, 반에는 여러 추측만 남았다. 다음에는 소문보다 단서를 먼저 확인해야 한다.','BAD'],
 bad:['BAD ENDING','탐정의 결론은 빗나갔다. 누군가를 빨리 지목하려는 마음 때문에 단서가 서로 어떻게 이어지는지 놓쳤다. “하나만 알고 둘은 모른다”는 말이 수첩 맨 위에 남았다.','다시 도전'],
 rumor:['RUMOR ENDING','USB는 찾았지만, 공개적으로 몰아붙이는 사이에 수아의 이름이 퍼졌다. 진실을 맞히는 것만으로는 충분하지 않았다. 말은 발이 없어도 멀리 간다.','주의'],
 good:['GOOD ENDING','USB를 찾고 발표도 지켰다. 동민은 사과했고, 친구들은 영상을 다시 확인했다. 다만 몇몇 의심은 완전히 풀리지 않았다.','성공'],
 true:['TRUE ENDING','탐정은 동민이 USB를 숨긴 이유와 장소를 정확히 밝혀냈다. 선생님은 필요한 사실만 반에 알렸고, 수아의 이름은 소문이 되지 않았다.','진실'],
 secret:['SECRET ENDING','세 사람은 먼저 머리를 맞댔다. 동민은 실수를 고치고 사과했고, 소연은 더는 말이 커지지 않게 도왔다. 준호는 장비를 챙기며 발표를 살렸다. 방송이 끝난 뒤, 모두는 다리를 뻗고 잘 수 있었다.','최고']
 }[type];
 el('topbar')?.classList.add('hide'); app.innerHTML=`<div class="wrap screen"><div class="ending"><span class="grade">${data[2]}</span><h2>${data[0]}</h2><p class="story">${data[1]}</p><div class="statbar"><div class="stat"><small>탐정</small><b>${state.badge} ${state.name}</b></div><div class="stat"><small>추리력</small><b>${state.deduction}</b></div><div class="stat"><small>공감도</small><b>${state.empathy}</b></div><div class="stat"><small>소문 위험</small><b>${state.rumor}</b></div></div><div class="panel"><h3 class="section-title">📌 이번 사건에서 만난 관용표현</h3><p style="color:var(--muted);line-height:1.7">입이 무겁다, 입이 가볍다, 발 없는 말이 천리 간다, 발을 빼다, 삼천포로 빠지다, 하나만 알고 둘은 모른다, 하나를 보고 열을 안다, 손바닥으로 하늘 가리기, 까마귀 날자 배 떨어진다, 마른침을 삼키다, 시치미를 떼다, 손발을 맞추다, 머리를 맞대다, 말 한마디에 천 냥 빚도 갚는다 등</p></div><div class="btn-row"><button class="btn" onclick="location.reload()">처음부터 다시</button><button class="btn secondary" onclick="state.screen='book';el('topbar').classList.remove('hide');render()">관용표현 도감</button></div></div></div>`}
function idiomBook(){state.step=14; screenShell('관용표현 도감','121개+보충 표현', `<div class="panel"><h3 class="section-title">📚 관용표현 검색</h3><input id="search" placeholder="표현이나 뜻 검색" style="width:100%;border:1px solid var(--line);background:#0a1b2d;color:var(--text);border-radius:15px;padding:13px" oninput="drawBook(this.value)"><div class="book idiom-grid" id="bookgrid"></div><div class="btn-row"><button class="btn" onclick="state.screen='final';render()">최종 추리로 돌아가기</button></div></div>`); drawBook('')}
function drawBook(q){const list=idioms.filter(([a,b])=>(a+b).includes(q||'')).map(([a,b])=>`<div class="idiom"><b>${a}</b><span>${b}</span></div>`).join(''); el('bookgrid').innerHTML=list}

renderHome(); updateTimer();
</script>
